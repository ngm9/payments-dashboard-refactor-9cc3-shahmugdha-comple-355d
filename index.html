<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Utkrusht Payments Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f7;
      color: #222;
    }
    header {
      background: #1f2933;
      color: #fff;
      padding: 1rem 1.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.2rem;
    }
    #app {
      padding: 1.5rem;
    }
    .dashboard-container {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 1rem 1.25rem 1.5rem;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .filters input[type="date"] {
      padding: 0.35rem 0.5rem;
    }
    .filters button {
      padding: 0.35rem 0.75rem;
      cursor: pointer;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .summary-card {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .summary-card h3 {
      margin: 0 0 0.25rem;
      font-size: 0.9rem;
      color: #4b5563;
    }
    .summary-card .value {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .banner-error {
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      border-radius: 4px;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .loading-indicator {
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <header>
    <h1>Utkrusht Payments Dashboard</h1>
  </header>
  <main id="app">
    <div class="dashboard-container" id="dashboard-root">
      <!-- Payments dashboard will be initialized here by app.js -->
    </div>
  </main>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
